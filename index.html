<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Room Check-in">
<meta name="theme-color" content="#FDF8F3">
<title>Daily Room Check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange:    #F46B1A;
    --orange-dk: #C4500E;
    --orange-lt: #FEE5D0;
    --cream:     #FDF8F3;
    --warm-dk:   #1A0F08;
    --warm-md:   #5C3D28;
    --warm-lt:   #A8754E;
    --surface:   #FFFFFF;
    --border:    rgba(244,107,26,0.18);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  html { height: 100%; -webkit-text-size-adjust: 100%; }

  body {
    min-height: 100dvh;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--warm-dk);
    overscroll-behavior: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed; top: -80px; right: -80px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(244,107,26,0.13) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none; z-index: 0;
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    padding: calc(16px + var(--safe-top)) 16px calc(24px + var(--safe-bottom));
    max-width: 480px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    padding: 8px 4px 20px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }

  .header-left { display: flex; flex-direction: column; gap: 2px; }

  .header-eyebrow {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--orange);
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(24px, 6.5vw, 32px);
    line-height: 1.1; color: var(--warm-dk);
  }

  .header h1 em { font-style: italic; color: var(--orange); }

  .date-badge {
    flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 11px;
    background: var(--orange-lt); border-radius: 50px;
    font-size: 11px; font-weight: 600; color: var(--orange-dk);
    margin-top: 4px; white-space: nowrap;
  }

  /* Card */
  .card {
    flex: 1;
    background: var(--surface); border-radius: 24px;
    border: 1px solid var(--border);
    padding: 24px 20px;
    box-shadow: 0 4px 32px rgba(200,90,20,0.08), 0 1px 4px rgba(200,90,20,0.04);
    display: flex; flex-direction: column;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Fields */
  .fields { display: flex; flex-direction: column; flex: 1; }

  .field { padding: 18px 0; border-bottom: 1px solid var(--border); }
  .field:first-of-type { padding-top: 4px; }
  .field:last-of-type  { border-bottom: none; padding-bottom: 4px; }

  .field-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 600; color: var(--warm-md);
    margin-bottom: 14px;
  }

  .field-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    background: var(--orange-lt); color: var(--orange-dk);
    border-radius: 50%;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }

  /* Big toggle buttons */
  .toggle-wrap { display: flex; gap: 10px; }
  .toggle-opt  { flex: 1; }
  .toggle-opt input[type="radio"] { display: none; }

  .toggle-opt label {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    padding: 18px 12px;
    border: 2px solid var(--border); border-radius: 16px;
    cursor: pointer; font-size: 14px; font-weight: 600; color: var(--warm-lt);
    transition: all 0.15s ease; user-select: none;
    -webkit-tap-highlight-color: transparent; min-height: 82px;
  }

  .toggle-opt label .icon { font-size: 26px; line-height: 1; transition: transform 0.2s ease; }

  .toggle-opt input:checked + label {
    border-color: var(--orange); background: var(--orange-lt); color: var(--orange-dk);
    box-shadow: 0 0 0 3px rgba(244,107,26,0.12);
  }

  .toggle-opt input:checked + label .icon { transform: scale(1.15); }

  /* Duration grid */
  .chips { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .chip-opt input[type="radio"] { display: none; }

  .chip-opt label {
    display: flex; align-items: center; justify-content: center;
    padding: 14px 10px;
    border: 2px solid var(--border); border-radius: 14px;
    cursor: pointer; font-size: 14px; font-weight: 500; color: var(--warm-lt);
    transition: all 0.15s ease; text-align: center;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }

  .chip-opt input:checked + label {
    background: var(--orange); border-color: var(--orange); color: #fff;
    box-shadow: 0 2px 12px rgba(244,107,26,0.35);
  }

  /* Stars */
  .stars {
    display: flex; gap: 2px;
    flex-direction: row-reverse; justify-content: flex-end;
  }

  .stars input[type="radio"] { display: none; }

  .stars label {
    font-size: 44px; cursor: pointer; color: #E0D5CD;
    transition: color 0.1s, transform 0.1s; line-height: 1;
    user-select: none; -webkit-tap-highlight-color: transparent; padding: 2px;
  }

  .stars label:hover,
  .stars label:hover ~ label,
  .stars input:checked ~ label { color: var(--orange); }

  .stars label:active { transform: scale(0.9); }

  /* Textarea */
  .note-input {
    width: 100%; padding: 14px;
    border: 2px solid var(--border); border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; /* Must be 16px to prevent iOS auto-zoom */
    color: var(--warm-dk); background: var(--cream);
    resize: none; outline: none; min-height: 88px;
    transition: border-color 0.15s; -webkit-appearance: none;
  }

  .note-input::placeholder { color: var(--warm-lt); opacity: 0.7; }
  .note-input:focus { border-color: var(--orange); background: #fff; }

  /* Submit */
  .submit-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 20px;
    background: var(--orange); color: #fff;
    border: none; border-radius: 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 17px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.01em;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(244,107,26,0.4);
    margin-top: 20px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }

  .submit-btn:active {
    background: var(--orange-dk);
    transform: scale(0.97);
    box-shadow: 0 2px 10px rgba(244,107,26,0.3);
  }

  /* Success */
  .success {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 16px; flex: 1; padding: 40px 24px;
  }

  .success-icon {
    width: 80px; height: 80px; background: var(--orange-lt);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .success h2 { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--warm-dk); }
  .success p  { font-size: 16px; color: var(--warm-lt); line-height: 1.5; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-left">
      <span class="header-eyebrow">Room check-in</span>
      <h1>How'd the<br><em>cleaning go?</em></h1>
    </div>
    <div class="date-badge">📅 <span id="today-date"></span></div>
  </div>

  <div class="card" id="form-card">
    <form
      id="cleaning-form"
      action="https://docs.google.com/forms/d/e/1FAIpQLSc-5WSfdZMEZRpNgQvQRWsR_mbc4YyWqR7odMImFKvYFvufXg/formResponse"
      method="POST"
      target="hidden-iframe"
      onsubmit="handleSubmit(event)"
    >
      <div class="fields">

        <!-- Who are you? -->
        <div class="field">
          <div class="field-label"><span class="field-num">👤</span>Who are you?</div>
          <div class="toggle-wrap">
            <div class="toggle-opt">
              <input type="radio" name="entry.1350363985" id="liam" value="Liam" required>
              <label for="liam"><span class="icon">🙋</span>Liam</label>
            </div>
            <div class="toggle-opt">
              <input type="radio" name="entry.1350363985" id="josiah" value="Josiah">
              <label for="josiah"><span class="icon">🙋</span>Josiah</label>
            </div>
          </div>
        </div>

        <!-- Did you clean? -->
        <div class="field">
          <div class="field-label"><span class="field-num">1</span>Did you clean today?</div>
          <div class="toggle-wrap">
            <div class="toggle-opt">
              <input type="radio" name="entry.1458091780" id="yes" value="Yes" required>
              <label for="yes"><span class="icon">✅</span>Yes, I did</label>
            </div>
            <div class="toggle-opt">
              <input type="radio" name="entry.1458091780" id="no" value="No">
              <label for="no"><span class="icon">❌</span>Not today</label>
            </div>
          </div>
        </div>

        <!-- Duration -->
        <div class="field">
          <div class="field-label"><span class="field-num">2</span>How long did you clean?</div>
          <div class="chips">
            <div class="chip-opt">
              <input type="radio" name="entry.814800859" id="d5" value="Under 10 min">
              <label for="d5">Under 10 min</label>
            </div>
            <div class="chip-opt">
              <input type="radio" name="entry.814800859" id="d10" value="10–15 min">
              <label for="d10">10–15 min</label>
            </div>
            <div class="chip-opt">
              <input type="radio" name="entry.814800859" id="d20" value="15–30 min">
              <label for="d20">15–30 min</label>
            </div>
            <div class="chip-opt">
              <input type="radio" name="entry.814800859" id="d30" value="30 min+">
              <label for="d30">30 min+</label>
            </div>
          </div>
        </div>

        <!-- Stars -->
        <div class="field">
          <div class="field-label"><span class="field-num">3</span>How productive was it?</div>
          <div class="stars">
            <input type="radio" name="entry.1170672298" id="s5" value="5">
            <label for="s5" title="5 stars">★</label>
            <input type="radio" name="entry.1170672298" id="s4" value="4">
            <label for="s4" title="4 stars">★</label>
            <input type="radio" name="entry.1170672298" id="s3" value="3">
            <label for="s3" title="3 stars">★</label>
            <input type="radio" name="entry.1170672298" id="s2" value="2">
            <label for="s2" title="2 stars">★</label>
            <input type="radio" name="entry.1170672298" id="s1" value="1">
            <label for="s1" title="1 star">★</label>
          </div>
        </div>

        <!-- Notes -->
        <div class="field">
          <div class="field-label">
            <span class="field-num">+</span>Any notes?
            <span style="font-weight:400;color:var(--warm-lt)">(optional)</span>
          </div>
          <textarea
            class="note-input"
            name="entry.1609035131"
            id="note"
            placeholder="e.g. Vacuumed, changed sheets..."
            rows="3"
          ></textarea>
        </div>

      </div>

      <button type="submit" class="submit-btn">
        Log it →
      </button>

    </form>

    <div class="success" id="success-msg">
      <div class="success-icon">🧹</div>
      <h2>Logged!</h2>
      <p>Thanks for checking in.<br>See you tomorrow.</p>
    </div>
  </div>

</div>

<iframe name="hidden-iframe" style="display:none"></iframe>

<script>
  const d = new Date();
  document.getElementById('today-date').textContent =
    d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });

  function handleSubmit(e) {
    e.preventDefault();
    const form = document.getElementById('cleaning-form');
    const data = new FormData(form);
    fetch(form.action, { method: 'POST', mode: 'no-cors', body: data })
      .then(() => showSuccess())
      .catch(() => showSuccess());
  }

  function showSuccess() {
    document.getElementById('cleaning-form').style.display = 'none';
    const s = document.getElementById('success-msg');
    s.style.display = 'flex';
  }
</script>
</body>
</html>
